<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WorldClock — Every timezone, instantly</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0b0c10;--surface:#13151c;--surface2:#1a1d27;--border:rgba(255,255,255,0.07);--border-bright:rgba(255,255,255,0.14);--accent:#4fffb0;--accent-dim:rgba(79,255,176,0.12);--accent-dim2:rgba(79,255,176,0.05);--text:#eef0f6;--text-muted:#6b7080;--text-dim:#2e3244;--red:#ff5f6b;--amber:#ffb340;--mono:'Space Mono',monospace;--sans:'Space Grotesk',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column}
header{padding:1.1rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;flex-wrap:wrap;position:sticky;top:0;background:rgba(11,12,16,0.94);backdrop-filter:blur(14px);z-index:100}
.logo{display:flex;align-items:baseline;gap:0.4rem;flex-shrink:0}
.logo-mark{font-family:var(--mono);font-size:1.1rem;font-weight:700;color:var(--accent);letter-spacing:-0.02em}
.logo-sub{font-size:0.68rem;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase}
.header-controls{display:flex;align-items:center;gap:0.65rem;flex:1;flex-wrap:wrap}
.ref-block{display:flex;align-items:center;gap:0.55rem;background:var(--surface);border:1px solid var(--border-bright);border-radius:8px;padding:0.42rem 0.8rem;flex:1;min-width:200px;max-width:360px}
.ref-block label{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap}
#refZone{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:0.85rem;font-weight:500;cursor:pointer;min-width:0}
#refZone option,#refZone optgroup{background:#1a1d27;color:#eef0f6}
.time-block{display:flex;align-items:center;gap:0.55rem;background:var(--surface);border:1px solid var(--border-bright);border-radius:8px;padding:0.42rem 0.8rem}
.time-block label{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap}
#refTime{background:transparent;border:none;outline:none;color:var(--accent);font-family:var(--mono);font-size:0.9rem;font-weight:700;width:76px;cursor:pointer;color-scheme:dark}
.live-pill{display:flex;align-items:center;gap:0.4rem;padding:0.38rem 0.85rem;border-radius:999px;font-size:0.73rem;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all 0.15s;white-space:nowrap;user-select:none;font-family:var(--sans)}
.live-pill.active{background:var(--accent-dim);border-color:rgba(79,255,176,0.28);color:var(--accent)}
.live-pill.paused{background:rgba(255,95,107,0.1);border-color:rgba(255,95,107,0.28);color:var(--red)}
.live-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.live-pill.active .live-dot{animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.35;transform:scale(0.65)}}
.hero{padding:1.6rem 2rem 0.4rem;display:flex;align-items:baseline;gap:0.8rem;flex-wrap:wrap}
#heroTime{font-family:var(--mono);font-size:clamp(2.6rem,6vw,4.4rem);font-weight:700;color:var(--accent);letter-spacing:-0.04em;line-height:1}
#heroMeta{display:flex;flex-direction:column;justify-content:flex-end;gap:2px}
#heroZone{font-size:0.82rem;color:var(--text-muted);letter-spacing:0.03em}
#heroDate{font-size:0.78rem;color:var(--text-dim)}
.quickpicks{padding:0.7rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap}
.qp-label{font-size:0.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;margin-right:0.3rem;white-space:nowrap}
.qpbtn{padding:0.28rem 0.7rem;border-radius:6px;font-size:0.72rem;font-weight:600;border:1px solid var(--border-bright);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.15s;font-family:var(--mono);letter-spacing:0.02em}
.qpbtn:hover{color:var(--text);border-color:rgba(255,255,255,0.25)}
.qpbtn.active{background:var(--accent-dim);border-color:rgba(79,255,176,0.35);color:var(--accent)}
.qpbtn.active.is-ref{box-shadow:0 0 0 1.5px var(--accent)}
.qp-clear{padding:0.28rem 0.6rem;border-radius:6px;font-size:0.7rem;font-weight:500;border:1px solid rgba(255,95,107,0.25);background:transparent;color:var(--red);cursor:pointer;font-family:var(--sans);margin-left:0.25rem;transition:all 0.15s}
.qp-clear:hover{background:rgba(255,95,107,0.1)}
.toolbar{padding:0.85rem 2rem;display:flex;align-items:center;gap:0.65rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:160px;max-width:340px}
.search-wrap svg{position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--text-muted);pointer-events:none}
#searchBox{width:100%;background:var(--surface);border:1px solid var(--border-bright);border-radius:8px;padding:0.48rem 0.75rem 0.48rem 2.1rem;color:var(--text);font-family:var(--sans);font-size:0.85rem;outline:none;transition:border-color 0.15s}
#searchBox:focus{border-color:rgba(79,255,176,0.38)}
#searchBox::placeholder{color:var(--text-muted)}
.region-filters{display:flex;gap:0.35rem;flex-wrap:wrap}
.rfbtn{padding:0.32rem 0.75rem;border-radius:999px;font-size:0.72rem;font-weight:500;border:1px solid var(--border-bright);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.15s;font-family:var(--sans)}
.rfbtn:hover{color:var(--text)}
.rfbtn.on{background:var(--accent-dim);border-color:rgba(79,255,176,0.28);color:var(--accent)}
.count-note{margin-left:auto;font-size:0.72rem;color:var(--text-muted);font-family:var(--mono);white-space:nowrap}
.table-wrap{flex:1;overflow-x:auto;margin:1.2rem 2rem 2rem;border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:0.84rem;min-width:540px}
thead{background:var(--surface2)}
thead th{padding:0.65rem 1rem;text-align:left;font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--text)}
thead th.sorted{color:var(--accent)}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.08s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--accent-dim2)}
tbody tr.is-ref td.col-country{color:var(--accent)}
tbody tr.is-ref{background:rgba(79,255,176,0.04)}
tbody td{padding:0.6rem 1rem;vertical-align:middle;white-space:nowrap}
td.col-num{font-family:var(--mono);font-size:0.7rem;color:var(--text-dim);width:38px}
td.col-country{font-weight:500;color:var(--text);min-width:155px}
td.col-tz{color:var(--text-muted);font-size:0.76rem}
td.col-offset{font-family:var(--mono);font-size:0.76rem;color:var(--text-muted)}
td.col-time{font-family:var(--mono);font-size:0.98rem;font-weight:700;color:var(--text);letter-spacing:-0.01em}
td.col-day{font-size:0.76rem}
.day-same{color:var(--text-muted)}
.day-ahead{color:var(--amber)}
.day-behind{color:var(--red)}
.day-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:0.67rem;font-weight:700;margin-left:5px;vertical-align:middle}
.day-ahead .day-tag{background:rgba(255,179,64,0.12);color:var(--amber)}
.day-behind .day-tag{background:rgba(255,95,107,0.12);color:var(--red)}
.rdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:7px;vertical-align:middle;opacity:0.65}
.empty-cell{text-align:center;padding:4rem 2rem;color:var(--text-muted);font-size:0.88rem}
td.col-check,th.col-check{width:36px;text-align:center;cursor:pointer}
.cb{appearance:none;-webkit-appearance:none;width:15px;height:15px;border:1.5px solid var(--border-bright);border-radius:4px;background:transparent;cursor:pointer;display:block;margin:0 auto;transition:all 0.12s;flex-shrink:0}
.cb:checked{background:var(--accent);border-color:var(--accent)}
.cb:checked::after{content:"✓";display:block;color:#000;font-size:10px;font-weight:700;line-height:15px;text-align:center}
.cb:hover{border-color:var(--accent)}
tbody tr.is-checked{background:rgba(79,255,176,0.07)}
.sel-bar{display:flex;align-items:center;gap:0.6rem;margin-left:0.25rem}
.sel-count{font-size:0.72rem;font-family:var(--mono);color:var(--accent);background:var(--accent-dim);padding:0.2rem 0.55rem;border-radius:999px;white-space:nowrap}
.sel-toggle{padding:0.32rem 0.75rem;border-radius:999px;font-size:0.72rem;font-weight:500;border:1px solid var(--border-bright);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.15s;font-family:var(--sans)}
.sel-toggle:hover{color:var(--text)}
.sel-toggle.on{background:var(--accent-dim);border-color:rgba(79,255,176,0.28);color:var(--accent)}
.sel-clear{padding:0.32rem 0.6rem;border-radius:999px;font-size:0.72rem;font-weight:500;border:1px solid rgba(255,95,107,0.25);background:transparent;color:var(--red);cursor:pointer;transition:all 0.15s;font-family:var(--sans)}
.sel-clear:hover{background:rgba(255,95,107,0.1)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px}
@media(max-width:640px){header,div.toolbar,div.hero{padding-left:1rem;padding-right:1rem}.table-wrap{margin-left:1rem;margin-right:1rem}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-mark">WorldClock</span>
    <span class="logo-sub">Every timezone</span>
  </div>
  <div class="header-controls">
    <div class="ref-block">
      <label>Zone</label>
      <select id="refZone"></select>
    </div>
    <div class="time-block">
      <label>at</label>
      <input type="time" id="refTime" step="60"/>
    </div>
    <button class="live-pill active" id="liveBtn" onclick="toggleLive()">
      <span class="live-dot"></span>
      <span id="liveTxt">Live</span>
    </button>
  </div>
</header>

<div class="hero">
  <span id="heroTime">00:00:00</span>
  <div id="heroMeta">
    <span id="heroZone"></span>
    <span id="heroDate"></span>
  </div>
</div>

<div class="quickpicks" id="quickpicks">
  <span class="qp-label">Quick</span>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchBox" placeholder="Search country or timezone…" oninput="renderTable()"/>
  </div>
  <div class="region-filters" id="regionFilters"></div>
  <div class="sel-bar" id="selBar" style="display:none">
    <span class="sel-count" id="selCount">0 selected</span>
    <button class="sel-toggle" id="selToggle" onclick="toggleSelOnly()">Show selected only</button>
    <button class="sel-clear" onclick="clearAll()">Clear</button>
  </div>
  <span class="count-note" id="countNote"></span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th class="col-check"><input type="checkbox" class="cb" id="checkAll" title="Select all visible" onchange="toggleCheckAll(this)"/></th>
        <th class="col-num">#</th>
        <th onclick="setSort('country')" id="th-country">Country / Region <span id="sa-country">↕</span></th>
        <th onclick="setSort('tz')" id="th-tz">Timezone <span id="sa-tz">↕</span></th>
        <th onclick="setSort('offset')" id="th-offset">UTC offset <span id="sa-offset">↕</span></th>
        <th onclick="setSort('time')" id="th-time">Local time <span id="sa-time">↕</span></th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="tzBody"></tbody>
  </table>
</div>

const RC={"Asia":"#4fffb0","Europe":"#6e9dff","Africa":"#ffb340","Americas":"#ff7eb8","Pacific":"#c084fc"};

const QUICK=[
  ["IST","Asia/Kolkata"],
  ["EST","America/New_York"],
  ["CST","America/Chicago"],
  ["MST","America/Denver"],
  ["PST","America/Los_Angeles"],
  ["GMT","Europe/London"],
  ["CET","Europe/Paris"],
  ["EET","Europe/Athens"],
  ["MSK","Europe/Moscow"],
  ["GST","Asia/Dubai"],
  ["PKT","Asia/Karachi"],
  ["BST","Asia/Dhaka"],
  ["ICT","Asia/Bangkok"],
  ["CST·CN","Asia/Shanghai"],
  ["JST","Asia/Tokyo"],
  ["KST","Asia/Seoul"],
  ["AEST","Australia/Sydney"],
  ["NZST","Pacific/Auckland"],
  ["BRT","America/Sao_Paulo"],
  ["ART","America/Argentina/Buenos_Aires"],
  ["CAT","Africa/Johannesburg"],
  ["EAT","Africa/Nairobi"],
  ["WAT","Africa/Lagos"],
];

function clearQuick(){
  activeQuick.clear();
  updateQuickActive();
  renderTable();
}

function buildQuickpicks(){
  const wrap=document.getElementById("quickpicks");
  QUICK.forEach(([abbr,zone])=>{
    const b=document.createElement("button");
    b.className="qpbtn";b.textContent=abbr;b.dataset.zone=zone;
    b.title=zone.replace(/_/g," ");
    b.onclick=()=>toggleQuick(zone);
    wrap.appendChild(b);
  });
  const clr=document.createElement("button");
  clr.className="qp-clear";clr.id="qpClear";clr.textContent="Clear";clr.style.display="none";
  clr.onclick=clearQuick;
  wrap.appendChild(clr);
}

function toggleQuick(zone){
  if(activeQuick.has(zone)){
    activeQuick.delete(zone);
    // if we removed the ref zone, pick another active one or clear
    if(refZoneId===zone){
      const next=[...activeQuick][0];
      if(next) setRefZoneOnly(next);
    }
  } else {
    activeQuick.add(zone);
    setRefZoneOnly(zone);
  }
  updateQuickActive();
  renderTable();
}

function setRefZoneOnly(zone){
  refZoneId=zone;
  const sel=document.getElementById("refZone");
  for(let o of sel.options){if(o.value===zone){sel.value=zone;break;}}
  if(!isLive)syncInput();
  updateHero();
}

function setRefZone(zone){
  // called from dropdown — clears quick selection
  activeQuick.clear();
  refZoneId=zone;
  if(!isLive)syncInput();
  updateHero();
  renderTable();
  updateQuickActive();
}

function updateQuickActive(){
  document.querySelectorAll(".qpbtn").forEach(b=>{
    const inSet=activeQuick.has(b.dataset.zone);
    b.classList.toggle("active",inSet);
    b.classList.toggle("is-ref",inSet&&b.dataset.zone===refZoneId);
  });
  const clr=document.getElementById("qpClear");
  if(clr)clr.style.display=activeQuick.size>0?"inline-block":"none";
}

let isLive=true,liveInterval=null,refZoneId="Asia/Kolkata",activeRegion="All",sortKey="country",sortDir=1;
let selectedZones=new Set();
let showSelOnly=false;
let activeQuick=new Set();

function updateSelUI(){
  const n=selectedZones.size;
  const bar=document.getElementById("selBar");
  bar.style.display=n>0?"flex":"none";
  document.getElementById("selCount").textContent=n+" selected";
  const tog=document.getElementById("selToggle");
  tog.classList.toggle("on",showSelOnly);
  tog.textContent=showSelOnly?"Show all":"Show selected only";
}

function toggleSelOnly(){
  showSelOnly=!showSelOnly;
  updateSelUI();
  renderTable();
}

function clearAll(){
  selectedZones.clear();
  showSelOnly=false;
  updateSelUI();
  renderTable();
}

function toggleCheckAll(master){
  const checkboxes=document.querySelectorAll("tbody .cb");
  checkboxes.forEach(cb=>{
    cb.checked=master.checked;
    if(master.checked)selectedZones.add(cb.dataset.zone);
    else selectedZones.delete(cb.dataset.zone);
  });
  updateSelUI();
  renderTable();
}

function getOffsetMin(zone,date){
  try{
    const fmt=(z)=>new Intl.DateTimeFormat("en",{timeZone:z,hour:"2-digit",minute:"2-digit",hour12:false}).format(date);
    const [uh,um]=fmt("UTC").split(":").map(Number);
    const [lh,lm]=fmt(zone).split(":").map(Number);
    let d=(lh*60+lm)-(uh*60+um);
    if(d>720)d-=1440;if(d<-720)d+=1440;return d;
  }catch(e){return 0;}
}
function fmtOff(m){const s=m>=0?"+":"-";const a=Math.abs(m);return`UTC${s}${String(Math.floor(a/60)).padStart(2,"0")}:${String(a%60).padStart(2,"0")}`}
function fmtTime(d,z){try{return new Intl.DateTimeFormat("en-GB",{timeZone:z,hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).format(d);}catch(e){return"--:--:--"}}
function fmtHM(d,z){try{return new Intl.DateTimeFormat("en-GB",{timeZone:z,hour:"2-digit",minute:"2-digit",hour12:false}).format(d);}catch(e){return"--:--"}}
function fmtDate(d,z){try{return new Intl.DateTimeFormat("en",{timeZone:z,weekday:"short",day:"numeric",month:"short"}).format(d);}catch(e){return""}}
function getDOY(d,z){try{const p=t=>parseInt(new Intl.DateTimeFormat("en",{timeZone:z,[t]:"numeric"}).format(d));return p("year")*10000+p("month")*100+p("day");}catch(e){return 0}}

function buildSelect(){
  const sel=document.getElementById("refZone");
  const regions=[...new Set(ZONES.map(z=>z[2]))].sort();
  const groups={};regions.forEach(r=>groups[r]=[]);ZONES.forEach(z=>groups[z[2]].push(z));
  regions.forEach(region=>{
    const og=document.createElement("optgroup");og.label=region;
    groups[region].forEach(([name,zone])=>{
      const o=document.createElement("option");o.value=zone;o.textContent=name;
      if(zone==="Asia/Kolkata")o.selected=true;
      og.appendChild(o);
    });sel.appendChild(og);
  });
  sel.onchange=()=>{refZoneId=sel.value;if(!isLive)syncInput();renderTable();updateHero();updateQuickActive()};
}

function buildRegions(){
  const wrap=document.getElementById("regionFilters");
  ["All","Africa","Americas","Asia","Europe","Pacific"].forEach(r=>{
    const b=document.createElement("button");
    b.className="rfbtn"+(r==="All"?" on":"");b.textContent=r;b.dataset.r=r;
    b.onclick=()=>{activeRegion=r;document.querySelectorAll(".rfbtn").forEach(x=>x.classList.toggle("on",x.dataset.r===r));renderTable()};
    wrap.appendChild(b);
  });
}

function syncInput(){document.getElementById("refTime").value=fmtHM(new Date(),refZoneId)}

function getRefDate(){
  if(isLive)return new Date();
  const v=document.getElementById("refTime").value;if(!v)return new Date();
  const now=new Date();const c=fmtHM(now,refZoneId).split(":").map(Number);const i=v.split(":").map(Number);
  return new Date(now.getTime()+((i[0]-c[0])*60+(i[1]-c[1]))*60000);
}

function updateHero(){
  const d=getRefDate();
  document.getElementById("heroTime").textContent=fmtTime(d,refZoneId);
  document.getElementById("heroZone").textContent=refZoneId.split("/").pop().replace(/_/g," ")+" · "+fmtOff(getOffsetMin(refZoneId,d));
  document.getElementById("heroDate").textContent=fmtDate(d,refZoneId);
}

function setSort(k){
  if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=1;}
  document.querySelectorAll("thead th").forEach(t=>t.classList.remove("sorted"));
  const map={country:"th-country",tz:"th-tz",offset:"th-offset",time:"th-time"};
  if(map[k])document.getElementById(map[k]).classList.add("sorted");
  const sa={country:"sa-country",tz:"sa-tz",offset:"sa-offset",time:"sa-time"};
  Object.values(sa).forEach(id=>{const e=document.getElementById(id);if(e)e.textContent="↕"});
  if(sa[k])document.getElementById(sa[k]).textContent=sortDir===1?"↑":"↓";
  renderTable();
}

function renderTable(){
  const q=document.getElementById("searchBox").value.toLowerCase().trim();
  const date=getRefDate();const refDOY=getDOY(date,refZoneId);
  let rows=ZONES.filter(([n,z,r])=>{
    if(activeQuick.size>0&&!activeQuick.has(z))return false;
    if(showSelOnly&&!selectedZones.has(z))return false;
    if(activeRegion!=="All"&&r!==activeRegion)return false;
    if(q&&!n.toLowerCase().includes(q)&&!z.toLowerCase().includes(q))return false;
    return true;
  }).map(([n,z,r])=>({n,z,r,off:getOffsetMin(z,date),t:fmtTime(date,z),doy:getDOY(date,z)}));
  rows.sort((a,b)=>{
    if(sortKey==="country")return a.n.localeCompare(b.n)*sortDir;
    if(sortKey==="tz")return a.z.localeCompare(b.z)*sortDir;
    if(sortKey==="offset")return(a.off-b.off)*sortDir;
    if(sortKey==="time")return a.t.localeCompare(b.t)*sortDir;
    return 0;
  });
  const tbody=document.getElementById("tzBody");
  if(!rows.length){
    tbody.innerHTML=`<tr><td colspan="7" class="empty-cell">${showSelOnly?"No zones selected yet. Uncheck 'Show selected only' to pick zones.":"No timezones match your search."}</td></tr>`;
    document.getElementById("countNote").textContent="0 results";
    document.getElementById("checkAll").checked=false;
    return;
  }
  let html="";
  rows.forEach((r,i)=>{
    const isRef=r.z===refZoneId;const color=RC[r.r]||"#6b7080";
    const checked=selectedZones.has(r.z);
    let dc="day-same",de="";
    if(r.doy>refDOY){dc="day-ahead";de=`<span class="day-tag">+1</span>`;}
    else if(r.doy<refDOY){dc="day-behind";de=`<span class="day-tag">-1</span>`;}
    html+=`<tr${isRef?' class="is-ref"':checked?' class="is-checked"':''}>
<td class="col-check"><input type="checkbox" class="cb" data-zone="${r.z}" ${checked?"checked":""} onchange="onCheck(this)"/></td>
<td class="col-num">${i+1}</td>
<td class="col-country"><span class="rdot" style="background:${color}"></span>${r.n}${isRef?" ★":""}</td>
<td class="col-tz">${r.z.split("/").pop().replace(/_/g," ")}</td>
<td class="col-offset">${fmtOff(r.off)}</td>
<td class="col-time">${r.t}</td>
<td class="col-day"><span class="${dc}">${fmtDate(date,r.z)}${de}</span></td>
</tr>`;
  });
  tbody.innerHTML=html;
  const allChecked=rows.every(r=>selectedZones.has(r.z));
  const someChecked=rows.some(r=>selectedZones.has(r.z));
  const masterCb=document.getElementById("checkAll");
  masterCb.checked=allChecked&&rows.length>0;
  masterCb.indeterminate=!allChecked&&someChecked;
  document.getElementById("countNote").textContent=rows.length+" / "+ZONES.length+" zones";
}

function onCheck(cb){
  if(cb.checked)selectedZones.add(cb.dataset.zone);
  else selectedZones.delete(cb.dataset.zone);
  updateSelUI();
  // update row highlight without full re-render
  const row=cb.closest("tr");
  if(cb.checked&&!row.classList.contains("is-ref"))row.classList.add("is-checked");
  else row.classList.remove("is-checked");
  // update master checkbox state
  const allCbs=document.querySelectorAll("tbody .cb");
  const allChecked=[...allCbs].every(c=>c.checked);
  const someChecked=[...allCbs].some(c=>c.checked);
  const master=document.getElementById("checkAll");
  master.checked=allChecked;
  master.indeterminate=!allChecked&&someChecked;
}

function toggleLive(){
  isLive=!isLive;
  const btn=document.getElementById("liveBtn");
  btn.classList.toggle("active",isLive);btn.classList.toggle("paused",!isLive);
  document.getElementById("liveTxt").textContent=isLive?"Live":"Paused";
  if(isLive)startLive();else{clearInterval(liveInterval);syncInput();}
}

function startLive(){
  clearInterval(liveInterval);
  liveInterval=setInterval(()=>{syncInput();updateHero();renderTable();},1000);
}

document.getElementById("refTime").addEventListener("change",()=>{if(!isLive){updateHero();renderTable();}});
document.getElementById("refTime").addEventListener("input",()=>{
  if(isLive)toggleLive();
  updateHero();renderTable();
});
document.getElementById("refTime").addEventListener("focus",()=>{
  if(isLive)toggleLive();
});
buildSelect();buildRegions();buildQuickpicks();
refZoneId=document.getElementById("refZone").value;
syncInput();updateHero();renderTable();updateQuickActive();startLive();
</script>
